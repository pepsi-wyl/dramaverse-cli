name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # 手动触发

permissions:
  contents: write  # 允许创建 Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-mac-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Mac ARM64
        run: |
          pyinstaller --onefile --name "BanYun-Dramaverse" --console dramaverse_cli.py

          # 创建 .app 结构
          mkdir -p BanYun-Dramaverse.app/Contents/MacOS
          mkdir -p BanYun-Dramaverse.app/Contents/Resources

          # 移动可执行文件
          mv dist/BanYun-Dramaverse BanYun-Dramaverse.app/Contents/MacOS/

          # 创建启动脚本
          cat > BanYun-Dramaverse.app/Contents/MacOS/launcher << 'EOF'
          #!/bin/bash
          EXEC_PATH="$(cd "$(dirname "$0")" && pwd)/BanYun-Dramaverse"
          open -a Terminal "$EXEC_PATH"
          EOF
          chmod +x BanYun-Dramaverse.app/Contents/MacOS/launcher

          # 创建 Info.plist
          cat > BanYun-Dramaverse.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>launcher</string>
              <key>CFBundleName</key>
              <string>BanYun Dramaverse</string>
              <key>CFBundleDisplayName</key>
              <string>BanYun Dramaverse</string>
              <key>CFBundleIdentifier</key>
              <string>com.banyun.dramaverse</string>
              <key>CFBundleVersion</key>
              <string>1.0.0</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
          </dict>
          </plist>
          EOF

          # 打包成 zip
          zip -r dist/BanYun-Dramaverse-arm64.zip BanYun-Dramaverse.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-arm64
          path: dist/BanYun-Dramaverse-arm64.zip

  build-mac-x64:
    runs-on: macos-15-intel  # Intel Mac runner (支持到2027年)
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Mac x64
        run: |
          pyinstaller --onefile --name "BanYun-Dramaverse" --console dramaverse_cli.py

          # 创建 .app 结构
          mkdir -p BanYun-Dramaverse.app/Contents/MacOS
          mkdir -p BanYun-Dramaverse.app/Contents/Resources

          # 移动可执行文件
          mv dist/BanYun-Dramaverse BanYun-Dramaverse.app/Contents/MacOS/

          # 创建启动脚本
          cat > BanYun-Dramaverse.app/Contents/MacOS/launcher << 'EOF'
          #!/bin/bash
          EXEC_PATH="$(cd "$(dirname "$0")" && pwd)/BanYun-Dramaverse"
          open -a Terminal "$EXEC_PATH"
          EOF
          chmod +x BanYun-Dramaverse.app/Contents/MacOS/launcher

          # 创建 Info.plist
          cat > BanYun-Dramaverse.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>launcher</string>
              <key>CFBundleName</key>
              <string>BanYun Dramaverse</string>
              <key>CFBundleDisplayName</key>
              <string>BanYun Dramaverse</string>
              <key>CFBundleIdentifier</key>
              <string>com.banyun.dramaverse</string>
              <key>CFBundleVersion</key>
              <string>1.0.0</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
          </dict>
          </plist>
          EOF

          # 打包成 zip
          zip -r dist/BanYun-Dramaverse-x64.zip BanYun-Dramaverse.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-x64
          path: dist/BanYun-Dramaverse-x64.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows
        run: pyinstaller --onefile --name "BanYun-Dramaverse.exe" --console dramaverse_cli.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/BanYun-Dramaverse.exe

  release:
    needs: [build-mac-arm64, build-mac-x64, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/mac-arm64/BanYun-Dramaverse-arm64.zip
            dist/mac-x64/BanYun-Dramaverse-x64.zip
            dist/windows/BanYun-Dramaverse.exe
          body: |
            ## BanYun Dramaverse CLI

            ### 下载说明
            - **Mac ARM64**: M1/M2/M3/M4/M5 芯片（双击 .app 即可运行）
            - **Mac x64**: Intel 芯片（双击 .app 即可运行）
            - **Windows**: Windows 10/11（命令行运行）

            ### 使用方法
            1. 下载对应平台的文件
            2. Mac 用户解压后双击 BanYun-Dramaverse.app
            3. Windows 用户在命令行运行 exe 文件
            4. 配置 `.env` 文件或输入 API 凭证
            5. 凭证获取请联系 Dramaverse 团队