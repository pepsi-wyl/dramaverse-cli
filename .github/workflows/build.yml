name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # 手动触发

permissions:
  contents: write  # 允许创建 Release

jobs:
  build-mac-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Mac ARM64
        run: pyinstaller --onefile --name "BanYun-Dramaverse-arm64" --console dramaverse_cli.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-arm64
          path: dist/BanYun-Dramaverse-arm64

  build-mac-x64:
    runs-on: macos-15-intel  # Intel Mac runner (支持到2027年)
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Mac x64
        run: pyinstaller --onefile --name "BanYun-Dramaverse-x64" --console dramaverse_cli.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-x64
          path: dist/BanYun-Dramaverse-x64

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows
        run: pyinstaller --onefile --name "BanYun-Dramaverse.exe" --console dramaverse_cli.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/BanYun-Dramaverse.exe

  release:
    needs: [build-mac-arm64, build-mac-x64, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/mac-arm64/BanYun-Dramaverse-arm64
            dist/mac-x64/BanYun-Dramaverse-x64
            dist/windows/BanYun-Dramaverse.exe
          body: |
            ## BanYun Dramaverse CLI

            ### 下载说明
            - **Mac ARM64**: M1/M2/M3/M4 芯片
            - **Mac x64**: Intel 芯片
            - **Windows**: Windows 10/11

            ### 使用方法
            1. 下载对应平台的可执行文件
            2. 运行程序后输入 API 凭证
            3. 凭证获取请联系 Dramaverse 团队